services:
  db:
    image: ankane/pgvector:latest
    container_name: second-brain-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: second_brain
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  ollama:
    image: ollama/ollama:latest
    container_name: second-brain-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama

  ollama-pull-model:
    image: curlimages/curl:latest
    container_name: second-brain-ollama-pull
    depends_on:
      - ollama
    entrypoint: [ "sh", "-c", "sleep 10 && curl -X POST http://ollama:11434/api/pull -d '{\"name\": \"nomic-embed-text\"}'" ]

volumes:
  pgdata:
  ollama_data:
